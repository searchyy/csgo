<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}CS2 炼金面板{% endblock %}</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: #334155;
      --accent: #22c55e;
      --accent-2: #38bdf8;
      --warn: #f59e0b;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: linear-gradient(180deg, #0b1222 0%, #0f172a 100%);
      color: var(--text);
    }
    a { color: var(--accent-2); text-decoration: none; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: rgba(15, 23, 42, 0.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .brand { font-size: 18px; font-weight: 700; }
    .nav { display: flex; gap: 14px; flex-wrap: wrap; }
    .nav a {
      padding: 8px 12px;
      border-radius: 10px;
      background: #132036;
      color: #dbeafe;
    }
    .nav a.active { background: #1d4ed8; }
    .container { max-width: 1440px; margin: 0 auto; padding: 20px 24px 40px; }
    .hero { margin-bottom: 20px; }
    .hero h1 { margin: 0 0 8px; font-size: 28px; }
    .hero p { margin: 0; color: var(--muted); }
    .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
    }
    .toolbar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      align-items: end;
    }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    input, select, textarea, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f172a;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
    }
    textarea { min-height: 84px; resize: vertical; }
    button {
      cursor: pointer;
      background: linear-gradient(90deg, #2563eb 0%, #0891b2 100%);
      border: none;
      font-weight: 700;
    }
    button.secondary { background: #1f2937; border: 1px solid var(--line); }
    button.warn { background: linear-gradient(90deg, #d97706 0%, #ea580c 100%); }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    .stat {
      padding: 14px;
      border-radius: 14px;
      background: #0f172a;
      border: 1px solid var(--line);
    }
    .stat .label { color: var(--muted); font-size: 12px; }
    .stat .value { font-size: 24px; font-weight: 700; margin-top: 6px; }
    .table-wrap { overflow: auto; border-radius: 12px; border: 1px solid var(--line); }
    table { width: 100%; border-collapse: collapse; min-width: 980px; }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(51, 65, 85, 0.55);
      vertical-align: top;
      text-align: left;
      font-size: 13px;
    }
    th {
      position: sticky;
      top: 0;
      background: #111827;
      color: #cbd5e1;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    tr:hover td { background: rgba(30, 41, 59, 0.35); }
    .muted { color: var(--muted); }
    .mono { font-family: Consolas, Menlo, monospace; }
    .good { color: #22c55e; font-weight: 700; }
    .warn-text { color: var(--warn); }
    .danger-text { color: var(--danger); }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #0f172a;
      border: 1px solid var(--line);
      font-size: 12px;
    }
    .job-list { display: grid; gap: 10px; }
    .job-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #0f172a;
    }
    .progress-bar {
      height: 8px;
      background: #0b1220;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #22c55e 0%, #38bdf8 100%);
      width: 0%;
    }
    details summary { cursor: pointer; color: #cbd5e1; }
    .footer-note { color: var(--muted); font-size: 12px; margin-top: 12px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="topbar">
    <div class="brand">CS2 炼金工作台</div>
    <div class="nav">
      <a href="{{ url_for('prices_page') }}" class="{% if request.path == '/prices' %}active{% endif %}">价格看板</a>
      <a href="{{ url_for('crawl_progress_page') }}" class="{% if request.path == '/crawl-progress' %}active{% endif %}">抓取进度</a>
      <a href="{{ url_for('ev_page') }}" class="{% if request.path == '/ev' %}active{% endif %}">EV 排行</a>
      <a href="{{ url_for('optimizer_page') }}" class="{% if request.path == '/optimizer' %}active{% endif %}">单枪优化</a>
    </div>
  </div>
  <div class="container">
    {% block body %}{% endblock %}
  </div>
</body>
</html>
