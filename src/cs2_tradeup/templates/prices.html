{% extends "base.html" %}
{% block title %}价格看板 - CS2 炼金工作台{% endblock %}
{% block body %}
<div class="hero">
  <h1>多平台价格看板</h1>
  <p>优先读取本地 SQLite 价格快照，数据来源以 BUFF 为主。</p>
</div>

<div class="card">
  <div class="toolbar wide">
    <div>
      <label>搜索</label>
      <input id="search" placeholder="枪名 / 皮肤 / 系列" />
    </div>
    <div>
      <label>版本</label>
      <select id="variant">
        <option value="">全部</option>
        <option value="Normal">普通</option>
        <option value="StatTrak">StatTrak</option>
      </select>
    </div>
    <div>
      <label>外观</label>
      <select id="exterior">
        <option value="">全部</option>
        <option value="Factory New">崭新出厂</option>
        <option value="Minimal Wear">略有磨损</option>
        <option value="Field-Tested">久经沙场</option>
        <option value="Well-Worn">破损不堪</option>
        <option value="Battle-Scarred">战痕累累</option>
      </select>
    </div>
    <div>
      <label>系列</label>
      <select id="collection"><option value="">全部</option></select>
    </div>
    <div>
      <label>稀有度</label>
      <select id="rarity-name"><option value="">全部</option></select>
    </div>
    <div>
      <label>平台</label>
      <select id="platform"><option value="">全部</option></select>
    </div>
    <div>
      <label>仅看有价</label>
      <select id="has-price-only">
        <option value="false" selected>否</option>
        <option value="true">是</option>
      </select>
    </div>
    <div>
      <label>安全价范围</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
        <input id="min-price" type="number" step="0.01" placeholder="最低" />
        <input id="max-price" type="number" step="0.01" placeholder="最高" />
      </div>
    </div>
    <div>
      <label>排序</label>
      <select id="sort-by">
        <option value="item">名称</option>
        <option value="lowest_price">最低价</option>
        <option value="safe_price">安全价</option>
        <option value="recent_average_price">近期均价</option>
        <option value="sell_num">在售数量</option>
        <option value="fetched_at">抓取时间</option>
        <option value="platform_price">选定平台价</option>
      </select>
    </div>
    <div>
      <label>方向 / 条数</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
        <select id="sort-dir">
          <option value="asc" selected>升序</option>
          <option value="desc">降序</option>
        </select>
        <select id="limit">
          <option value="100">100</option>
          <option value="200" selected>200</option>
          <option value="500">500</option>
        </select>
      </div>
    </div>
    <div>
      <label>自动刷新</label>
      <select id="auto-refresh">
        <option value="0">关闭</option>
        <option value="5000">5 秒</option>
        <option value="10000" selected>10 秒</option>
        <option value="30000">30 秒</option>
        <option value="60000">60 秒</option>
      </select>
    </div>
    <div>
      <label>操作</label>
      <button id="btn-refresh">刷新价格</button>
    </div>
  </div>
  <div class="footer-note" id="live-status">自动刷新已关闭</div>
</div>

<div class="stats">
  <div class="stat"><div class="label">展示行数</div><div class="value" id="stat-rows">-</div></div>
  <div class="stat"><div class="label">有价条目</div><div class="value good" id="stat-priced">-</div></div>
  <div class="stat"><div class="label">最低安全价</div><div class="value" id="stat-min-price">-</div></div>
  <div class="stat"><div class="label">最高安全价</div><div class="value" id="stat-max-price">-</div></div>
</div>


<div class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>枪械 / 版本 / 外观</th>
          <th>系列 / 稀有度</th>
          <th>最低价</th>
          <th>安全价</th>
          <th>风控</th>
          <th>近期均价</th>
          <th>各平台价格</th>
          <th>在售</th>
          <th>抓取时间</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<script>
  const rowsEl = document.getElementById('rows');
  const liveStatusEl = document.getElementById('live-status');
  let pricesRefreshTimer = null;
  let pricesRefreshInFlight = false;

  function fmtPrice(value) {
    if (value === null || value === undefined || Number(value) === 0) return '-';
    return '¥' + Number(value).toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }

  function fmtDate(value) {
    if (!value) return '-';
    return String(value).replace('T', ' ').slice(0, 16);
  }

  async function fetchJson(url, options = {}) {
    const response = await fetch(url, {
      cache: 'no-store',
      ...options,
      headers: { 'Cache-Control': 'no-cache', ...(options.headers || {}) },
    });
    return response.json();
  }

  function updateLiveStatus(message = '') {
    const interval = Number(document.getElementById('auto-refresh').value || 0);
    const mode = interval > 0 ? `自动刷新 ${interval / 1000}s` : '自动刷新已关闭';
    liveStatusEl.textContent = message ? `${mode} · ${message}` : mode;
  }

  function riskChip(row) {
    if (!row.is_valid) return '<span class="chip red">不可用</span>';
    if (row.risk_level === 'high') return '<span class="chip yellow">风险高</span>';
    if (row.risk_level === 'medium') return '<span class="chip yellow">风险中</span>';
    return '<span class="chip green">正常</span>';
  }

  async function loadPrices() {
    if (pricesRefreshInFlight) return;
    pricesRefreshInFlight = true;
    const params = new URLSearchParams({
      search: document.getElementById('search').value,
      variant: document.getElementById('variant').value,
      exterior: document.getElementById('exterior').value,
      collection: document.getElementById('collection').value,
      rarity_name: document.getElementById('rarity-name').value,
      platform: document.getElementById('platform').value,
      min_price: document.getElementById('min-price').value,
      max_price: document.getElementById('max-price').value,
      has_price_only: document.getElementById('has-price-only').value,
      sort_by: document.getElementById('sort-by').value,
      sort_dir: document.getElementById('sort-dir').value,
      limit: document.getElementById('limit').value,
    });
    try {
      const data = await fetchJson(`/api/prices?${params}`);
      renderPrices(data.rows || []);
      updateLiveStatus(`上次刷新 ${new Date().toLocaleTimeString('zh-CN')}`);
    } finally {
      pricesRefreshInFlight = false;
    }
  }

  function renderPrices(rows) {
    const html = rows.map((row) => {
      const safePrice = row.safe_price ?? row.lowest_price;
      const platforms = (row.platform_prices || [])
        .filter((e) => e.price)
        .map((e) => `<div><span class="muted-sm">${e.platform_name}</span> <span class="good">${fmtPrice(e.price)}</span></div>`)
        .join('') || '<span class="muted">—</span>';
      const variantLabel = row.variant === 'StatTrak' ? '<span class="chip yellow" style="margin-left:4px;">ST</span>' : '';
      const exteriorLabel = row.exterior_zh ? `<span class="chip">${row.exterior_zh}</span>` : '';
      return `
        <tr>
          <td>
            <div style="font-weight:600;">${row.base_item_name_zh}${variantLabel}</div>
            <div class="muted-sm mono" style="margin-top:2px;">${row.base_item_name}</div>
            <div style="margin-top:4px;">${exteriorLabel}</div>
          </td>
          <td>
            <div>${row.collection_zh}</div>
            <div class="muted-sm">${row.rarity_name_zh}</div>
          </td>
          <td class="good">${fmtPrice(row.lowest_price)}</td>
          <td class="${row.is_valid ? 'good' : 'danger-text'}">${fmtPrice(safePrice)}</td>
          <td>${riskChip(row)}</td>
          <td>${fmtPrice(row.recent_average_price)}</td>
          <td>${platforms}</td>
          <td class="muted">${row.sell_num ?? '-'}</td>
          <td class="muted-sm">${fmtDate(row.fetched_at)}</td>
        </tr>`;
    }).join('');
    rowsEl.innerHTML = html || '<tr><td colspan="9" class="muted" style="text-align:center;padding:24px;">暂无价格数据</td></tr>';

    const priced = rows.filter((r) => Number((r.safe_price ?? r.lowest_price) || 0) > 0);
    document.getElementById('stat-rows').textContent = rows.length;
    document.getElementById('stat-priced').textContent = priced.length;
    document.getElementById('stat-min-price').textContent = priced.length
      ? fmtPrice(Math.min(...priced.map((r) => Number(r.safe_price ?? r.lowest_price)))) : '-';
    document.getElementById('stat-max-price').textContent = priced.length
      ? fmtPrice(Math.max(...priced.map((r) => Number(r.safe_price ?? r.lowest_price)))) : '-';
  }

  async function loadMeta() {
    const data = await fetchJson('/api/meta/options');
    for (const [id, rows] of [
      ['collection', data.collections || []],
      ['rarity-name', data.rarities || []],
      ['platform', data.platforms || []],
    ]) {
      const el = document.getElementById(id);
      const first = el.querySelector('option');
      el.innerHTML = first ? first.outerHTML : '<option value="">全部</option>';
      for (const row of rows) {
        const opt = document.createElement('option');
        opt.value = row.value;
        opt.textContent = row.label;
        el.appendChild(opt);
      }
    }
  }

  async function refresh() {
    await loadPrices();
  }

  function syncAutoRefresh() {
    if (pricesRefreshTimer) { clearInterval(pricesRefreshTimer); pricesRefreshTimer = null; }
    const interval = Number(document.getElementById('auto-refresh').value || 0);
    updateLiveStatus();
    if (interval > 0) {
      pricesRefreshTimer = setInterval(() => { if (!document.hidden) refresh(); }, interval);
    }
  }

  document.getElementById('btn-refresh').addEventListener('click', refresh);
  document.getElementById('auto-refresh').addEventListener('change', syncAutoRefresh);
  ['search','variant','exterior','collection','rarity-name','platform','min-price','max-price','has-price-only','sort-by','sort-dir','limit'].forEach((id) => {
    const el = document.getElementById(id);
    el.addEventListener('change', loadPrices);
    if (el.tagName === 'INPUT') el.addEventListener('input', loadPrices);
  });
  document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(); });

  loadMeta().then(refresh);
  syncAutoRefresh();
</script>
{% endblock %}
