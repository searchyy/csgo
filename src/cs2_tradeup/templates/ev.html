{% extends "base.html" %}
{% block title %}EV 排行 - CS2 炼金工作台{% endblock %}
{% block body %}
<div class="hero">
  <h1>全部枪械饰品炼金 EV 排行</h1>
  <p>扫描结果会落到本地 SQLite，前端页面只读取数据库中的结果进行排序和筛选。</p>
</div>

<div class="card">
  <div class="toolbar">
    <div>
      <label>搜索</label>
      <input id="search" placeholder="输入目标枪、系列、配方签名" />
    </div>
    <div>
      <label>最小 ROI</label>
      <input id="min-roi" type="number" step="0.01" value="1.05" />
    </div>
    <div>
      <label>目标系列</label>
      <select id="target-collection">
        <option value="">全部</option>
      </select>
    </div>
    <div>
      <label>目标稀有度</label>
      <select id="target-rarity-name">
        <option value="">全部</option>
      </select>
    </div>
    <div>
      <label>目标外观</label>
      <select id="target-exterior">
        <option value="">全部</option>
      </select>
    </div>
    <div>
      <label>最小 EV</label>
      <input id="min-expected-profit" type="number" step="0.01" placeholder="可选" />
    </div>
    <div>
      <label>最大成本</label>
      <input id="max-total-cost" type="number" step="0.01" placeholder="可选" />
    </div>
    <div>
      <label>排序字段</label>
      <select id="sort-by">
        <option value="roi">按 ROI</option>
        <option value="expected_profit">按 EV</option>
        <option value="total_cost">按成本</option>
        <option value="target_probability">按目标概率</option>
        <option value="created_at">按结果时间</option>
        <option value="target_item">按目标名称</option>
      </select>
    </div>
    <div>
      <label>方向</label>
      <select id="sort-dir">
        <option value="desc" selected>降序</option>
        <option value="asc">升序</option>
      </select>
    </div>
    <div>
      <label>显示条数</label>
      <select id="limit">
        <option value="50">50</option>
        <option value="100" selected>100</option>
        <option value="200">200</option>
      </select>
    </div>
    <div>
      <label>指定 Run ID（可选）</label>
      <input id="run-id" type="number" min="1" placeholder="留空看全部结果" />
    </div>
    <div>
      <label>刷新结果</label>
      <button id="btn-refresh">加载 EV 排行</button>
    </div>
    <div>
      <label>自动刷新</label>
      <select id="auto-refresh">
        <option value="0" selected>关闭</option>
        <option value="5000">5 秒</option>
        <option value="10000">10 秒</option>
        <option value="30000">30 秒</option>
        <option value="60000">60 秒</option>
      </select>
    </div>
  </div>
  <div class="footer-note" id="live-status">自动刷新已关闭</div>
</div>

<div class="stats">
  <div class="stat"><div class="label">结果条数</div><div class="value" id="stat-count">-</div></div>
  <div class="stat"><div class="label">最高 ROI</div><div class="value" id="stat-best-roi">-</div></div>
  <div class="stat"><div class="label">最高 EV</div><div class="value" id="stat-best-ev">-</div></div>
  <div class="stat"><div class="label">最近 Run</div><div class="value" id="stat-run">-</div></div>
</div>

<div class="card">
  <div class="toolbar">
    <div>
      <label>扫描指定枪名（可选，多行或逗号分隔）</label>
      <textarea id="scan-items" placeholder="留空表示从当前缓存中自动挑选目标做 EV 扫描"></textarea>
    </div>
    <div>
      <label>每个目标最多公式数</label>
      <input id="formula-limit" type="number" min="1" value="25" />
    </div>
    <div>
      <label>最大目标数量</label>
      <input id="max-targets" type="number" min="1" placeholder="留空表示不限制" />
    </div>
  <div>
      <label>仅用缓存</label>
      <select id="cache-only">
        <option value="false" selected>否，缓存优先缺失补抓</option>
        <option value="true">是，只读 SQLite</option>
      </select>
    </div>
    <div>
      <label>浮动策略</label>
      <select id="conservative-float-mode">
        <option value="true" selected>保守估算（默认）</option>
        <option value="false">需验浮模式</option>
      </select>
    </div>
    <div>
      <label>后台任务</label>
      <button id="btn-start-scan" class="warn">开始 EV 扫描</button>
    </div>
  </div>
</div>

<div class="card">
  <h3 style="margin-top:0;">最近扫描任务</h3>
  <div class="job-list" id="jobs"></div>
</div>

<div class="card">
  <h3 style="margin-top:0;">最近扫描 Run</h3>
  <div class="job-list" id="runs"></div>
</div>

<div class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>目标枪械</th>
          <th>浮动状态</th>
          <th>ROI</th>
          <th>EV</th>
          <th>成本</th>
          <th>目标概率</th>
          <th>配方签名</th>
          <th>材料</th>
          <th>主要产出</th>
        </tr>
      </thead>
      <tbody id="results"></tbody>
    </table>
  </div>
</div>

<script>
  const resultEl = document.getElementById('results');
  const jobsEl = document.getElementById('jobs');
  const runsEl = document.getElementById('runs');
  const liveStatusEl = document.getElementById('live-status');
  let evRefreshTimer = null;
  let evRefreshInFlight = false;

  function fmtPrice(value) {
    if (value === null || value === undefined) return '-';
    return Number(value).toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }

  function splitItemNames(raw) {
    return raw
      .split(/\n|,/g)
      .map((v) => v.trim())
      .filter(Boolean);
  }

  async function fetchJsonNoCache(url, options = {}) {
    const response = await fetch(url, {
      cache: 'no-store',
      ...options,
      headers: {
        'Cache-Control': 'no-cache',
        ...(options.headers || {}),
      },
    });
    return response.json();
  }

  function updateLiveStatus(message = '') {
    const interval = Number(document.getElementById('auto-refresh').value || 0);
    const mode = interval > 0 ? `自动刷新：${interval / 1000} 秒` : '自动刷新已关闭';
    const suffix = message ? ` / ${message}` : '';
    liveStatusEl.textContent = `${mode}${suffix}`;
  }

  async function loadResults() {
    if (evRefreshInFlight) return;
    evRefreshInFlight = true;
    const params = new URLSearchParams({
      search: document.getElementById('search').value,
      min_roi: document.getElementById('min-roi').value,
      min_expected_profit: document.getElementById('min-expected-profit').value,
      max_total_cost: document.getElementById('max-total-cost').value,
      target_collection: document.getElementById('target-collection').value,
      target_rarity_name: document.getElementById('target-rarity-name').value,
      target_exterior: document.getElementById('target-exterior').value,
      sort_by: document.getElementById('sort-by').value,
      sort_dir: document.getElementById('sort-dir').value,
      limit: document.getElementById('limit').value,
    });
    const runId = document.getElementById('run-id').value;
    if (runId) params.set('run_id', runId);
    try {
      const data = await fetchJsonNoCache(`/api/ev/results?${params.toString()}`);
      const rows = data.rows || [];
      renderResults(rows);
      updateLiveStatus(`上次刷新：${new Date().toLocaleTimeString('zh-CN')}`);
    } finally {
      evRefreshInFlight = false;
    }
  }

  function renderResults(rows) {
    resultEl.innerHTML = rows.map((row) => {
      const materials = (row.materials || []).map((entry) =>
        `<div>${entry.item_name_zh} x${entry.count} / ${entry.requested_exterior_zh} / ${fmtPrice(entry.unit_price)}<div class="muted">Float 区间 ${Number(entry.min_float || 0).toFixed(5)} ~ ${Number(entry.max_float || 0).toFixed(5)} / 估算 ${Number((entry.estimated_float ?? entry.max_float) || 0).toFixed(5)} / ${entry.float_source_label || '-'}</div></div>`
      ).join('');
      const outcomes = (row.outcomes || []).map((entry) =>
        `<div>${entry.item_name_zh} / p=${(Number(entry.probability) * 100).toFixed(2)}% / ${fmtPrice(entry.market_price)}</div>`
      ).join('');
      return `
        <tr>
          <td>
            <div>${row.target_item_zh}</div>
            <div class="muted">${row.target_exterior_zh} / ${row.target_collection_zh}</div>
          </td>
          <td><span class="chip">${row.float_validation_status_zh || '-'}</span></td>
          <td class="good">${row.roi_percent.toFixed(2)}%</td>
          <td class="good">${fmtPrice(row.expected_profit)}</td>
          <td>${fmtPrice(row.total_cost)}</td>
          <td>${(Number(row.target_probability) * 100).toFixed(2)}%</td>
          <td class="mono">${row.formula_signature}</td>
          <td>${materials}</td>
          <td>${outcomes}</td>
        </tr>
      `;
    }).join('') || '<tr><td colspan="9" style="text-align:center;" class="muted">暂无扫描结果，请先发起 EV 扫描</td></tr>';

    document.getElementById('stat-count').textContent = rows.length;
    document.getElementById('stat-best-roi').textContent = rows.length ? `${rows[0].roi_percent.toFixed(2)}%` : '-';
    document.getElementById('stat-best-ev').textContent = rows.length ? fmtPrice(Math.max(...rows.map((row) => Number(row.expected_profit)))) : '-';
    document.getElementById('stat-run').textContent = rows.length ? rows[0].run_id : '-';
  }

  async function loadRuns() {
    const data = await fetchJsonNoCache('/api/ev/runs?limit=10');
    const rows = data.rows || [];
    runsEl.innerHTML = rows.map((row) => `
      <div class="job-item">
        <div><strong>Run #${row.id}</strong> <span class="chip">${row.run_type}</span> <span class="chip">${row.status}</span></div>
        <div class="muted">创建时间：${row.created_at}</div>
        <div class="muted">摘要：${JSON.stringify(row.summary || {})}</div>
      </div>
    `).join('') || '<div class="muted">暂无扫描 Run</div>';
  }

  async function loadJobs() {
    const data = await fetchJsonNoCache('/api/tasks?limit=8');
    const rows = (data.rows || []).filter((row) => row.job_type === 'scan_ev');
    jobsEl.innerHTML = rows.map((job) => {
      const total = Number(job.progress_total || 0);
      const current = Number(job.progress_current || 0);
      const percent = total > 0 ? Math.max(0, Math.min(100, (current / total) * 100)) : 0;
      return `
        <div class="job-item">
          <div><strong>${job.title}</strong> <span class="chip">${job.status}</span></div>
          <div class="muted">${job.progress_message || ''}</div>
          <div class="muted">进度：${current}/${total || '-'}</div>
          <div class="progress-bar"><span style="width:${percent}%;"></span></div>
          <div class="muted">关联 Run：${job.metadata?.run_id ?? '-'}</div>
          ${job.error_message ? `<div class="danger-text">${job.error_message}</div>` : ''}
        </div>
      `;
    }).join('') || '<div class="muted">暂无 EV 后台任务</div>';
  }

  async function startScan() {
    const payload = {
      item_names: splitItemNames(document.getElementById('scan-items').value),
      min_roi: Number(document.getElementById('min-roi').value || 1.05),
      formula_limit_per_target: Number(document.getElementById('formula-limit').value || 25),
      max_targets: document.getElementById('max-targets').value || null,
      cache_only: document.getElementById('cache-only').value === 'true',
      conservative_float_mode: document.getElementById('conservative-float-mode').value === 'true',
    };
    await fetch('/api/tasks/scan-ev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      cache: 'no-store',
    });
    await refreshEvDashboard();
  }

  async function loadMeta() {
    const data = await fetchJsonNoCache('/api/meta/options');
    const map = [
      ['target-collection', data.collections || []],
      ['target-rarity-name', data.rarities || []],
      ['target-exterior', data.exteriors || []],
    ];
    for (const [id, rows] of map) {
      const el = document.getElementById(id);
      const first = el.querySelector('option');
      el.innerHTML = first ? first.outerHTML : '<option value="">全部</option>';
      for (const row of rows) {
        const opt = document.createElement('option');
        opt.value = row.value;
        opt.textContent = row.label;
        el.appendChild(opt);
      }
    }
  }

  async function refreshEvDashboard() {
    await Promise.all([loadResults(), loadRuns(), loadJobs()]);
  }

  function syncEvAutoRefresh() {
    if (evRefreshTimer) {
      clearInterval(evRefreshTimer);
      evRefreshTimer = null;
    }
    const interval = Number(document.getElementById('auto-refresh').value || 0);
    updateLiveStatus();
    if (interval > 0) {
      evRefreshTimer = setInterval(() => {
        if (!document.hidden) {
          refreshEvDashboard();
        }
      }, interval);
    }
  }

  document.getElementById('btn-refresh').addEventListener('click', refreshEvDashboard);
  document.getElementById('btn-start-scan').addEventListener('click', startScan);
  document.getElementById('auto-refresh').addEventListener('change', syncEvAutoRefresh);
  ['search', 'min-roi', 'min-expected-profit', 'max-total-cost', 'target-collection', 'target-rarity-name', 'target-exterior', 'sort-by', 'sort-dir', 'limit', 'run-id'].forEach((id) => {
    document.getElementById(id).addEventListener('change', loadResults);
    document.getElementById(id).addEventListener('input', loadResults);
  });
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      refreshEvDashboard();
    }
  });

  loadMeta().then(refreshEvDashboard);
  syncEvAutoRefresh();
</script>
{% endblock %}
